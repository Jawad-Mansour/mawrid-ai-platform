# Feature: CI/CD — Nightly Gates (Gates 7–9)
# Purpose: Expensive evals run nightly on master. Gates:
#   Gate 7: RAGAS evaluation (faithfulness ≥ 0.85, relevancy ≥ 0.80)
#   Gate 8: Intent classifier F1 ≥ 0.85 on test set (plan.md + CLAUDE.md)
#   Gate 9: Drift detection (PSI check on all 3 ML models)

name: Nightly Gates (7–9)

on:
  schedule:
    - cron: "0 2 * * *"  # 2 AM UTC daily
  workflow_dispatch:

jobs:
  gate7-ragas:
    name: "Gate 7: RAGAS Evaluation"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mawrid
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mawrid_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --frozen --dev
      - name: Run RAGAS eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: postgresql+asyncpg://mawrid:password@localhost:5432/mawrid_test
        run: uv run pytest backend/tests/evals/test_rag_quality.py -v --tb=short

  gate8-classifier-eval:
    name: "Gate 8: Classifier F1 Evaluation"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --frozen --dev
      - name: Intent classifier F1 check (Gate 8)
        run: uv run pytest backend/tests/evals/test_intent_classifier.py -v --tb=short

  gate9-drift:
    name: "Gate 9: Drift Detection (PSI)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [gate7-ragas, gate8-classifier-eval]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --frozen --dev
      - name: Run drift detection tests
        run: uv run pytest backend/tests/evals/test_drift.py -v --tb=short
      - name: Write last_drift_check.json (stable synthetic baseline)
        run: uv run python -m app.ml.drift.monitor --config backend/ml_config/drift_thresholds.yaml
