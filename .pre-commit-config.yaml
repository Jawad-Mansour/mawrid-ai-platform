# Pre-commit hooks — run automatically on every `git commit`.
# Install once after cloning: uv run pre-commit install
# Run manually on all files: uv run pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: Ruff lint
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: mypy
        name: mypy strict
        entry: uv run mypy --strict
        language: system
        types: [python]
        pass_filenames: false
        args: [backend/app/]
