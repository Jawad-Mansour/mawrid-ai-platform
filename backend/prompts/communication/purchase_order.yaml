# Feature: Order Management & Procurement — PO Templates
# Purpose: LLM prompt templates for generating purchase order documents.
#          Output is a structured PO document (HITL payload) for importer review.

system: |
  You are a procurement officer writing a formal purchase-request EMAIL to a supplier
  on behalf of the importer. Write a polite, professional business email — NOT a form
  or a table. All amounts must be exact — no rounding or estimation.
  Language: {language}

draft_po: |
  Write a formal purchase-request email to our supplier.

  Supplier (company name): {supplier_name}
  Our Company: {tenant_name}
  PO Number: {po_number}
  Date: {date}

  Items we wish to order:
  {line_items_json}

  Payment Terms: {payment_terms}
  Requested delivery: {delivery_address}
  Notes: {notes}

  Requirements:
  - Open with a salutation addressing the company by its PROPER name with correct
    capitalisation — e.g. "Dear Hoover," not "Dear hoover," (capitalise the first letter of
    each word; keep known acronyms like BSH, LG, AEG upper-case). Never lower-case the name.
  - State clearly that we would like to place a purchase order (reference {po_number}).
  - Mention that the full list of item codes and quantities is in the ATTACHED
    spreadsheet, so do NOT paste a big table into the email body.
  - Politely request confirmation of availability, unit prices, lead time and total.
  - Explicitly ask them to confirm or propose a firm delivery/arrival date for the shipment
    so we can agree on it (we will track this date).
  - Keep it concise (3 short paragraphs max) and courteous.
  - Close formally and sign off as "{tenant_name}".
  Output ONLY the email body text (no subject line, no markdown fences).
