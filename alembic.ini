# Feature: Database Migrations
# Purpose: Root-level Alembic config so `uv run alembic upgrade head` works
#          from the project root (as documented in CLAUDE.md).
#          script_location points to backend/alembic where env.py lives.
#          sqlalchemy.url is intentionally blank — set DATABASE_URL_SYNC env var.

[alembic]
script_location = backend/alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
