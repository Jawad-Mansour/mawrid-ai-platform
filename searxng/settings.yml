# SearXNG configuration — Mawrid AI Platform (Phase 2 enrichment)
# Inherit SearXNG's shipped defaults and override only what we need. This keeps us
# compatible across image updates (new required keys come from the defaults).
use_default_settings: true

general:
  instance_name: mawrid-searxng
  debug: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  # JSON is what the enrichment pipeline consumes; html kept so the limiter/UI work.
  formats:
    - json
    - html

server:
  secret_key: "mawrid-searxng-dev-secret-change-in-prod"
  base_url: http://searxng:8080
  bind_address: "0.0.0.0"
  image_proxy: false
  # Disable the bot limiter so the pipeline's programmatic JSON requests aren't blocked.
  limiter: false
  public_instance: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
